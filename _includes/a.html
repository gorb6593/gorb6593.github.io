{% assign href = include.href | strip %}
{% assign protocol = href | slice: 0, 4 %}
{% assign mailto = href | slice: 0, 7 %}
{% assign tel = href | slice: 0, 4 %}
<a
  href="{% if protocol == 'http' or mailto == 'mailto:' or tel == 'tel:' %}{{ href }}{% else %}{{ href | relative_url }}{% endif %}"
  {% if protocol == 'http' %}target="_blank" rel="noopener"{% endif %}
  class="{{ include.class }}"
>
